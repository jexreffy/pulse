name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            cdk/package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api/requirements-dev.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Python deps & run tests
        working-directory: api
        run: |
          pip install -r requirements-dev.txt
          pytest --tb=short -q

      - name: Lint Python
        working-directory: api
        run: |
          pip install ruff black
          black --check .
          ruff check .

      - name: Install & build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Install & build CDK
        working-directory: cdk
        run: npm ci && npm run build

      - name: CDK deploy
        working-directory: cdk
        run: npx cdk deploy --all --require-approval never --outputs-file ../cdk-outputs.json

      - name: Sync frontend to S3
        run: |
          BUCKET=$(jq -r '.PulseCdn.FrontendBucketName' cdk-outputs.json)
          aws s3 sync frontend/dist "s3://$BUCKET" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='pulse'].Id" \
            --output text)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
