name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            cdk/package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api/requirements-dev.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Python deps, lint & test
        working-directory: api
        run: |
          pip install -r requirements-dev.txt
          black --check .
          ruff check .
          pytest --tb=short -q

      - name: Install & build frontend
        working-directory: frontend
        run: npm ci && npm run lint && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Install & build CDK
        working-directory: cdk
        run: npm ci && npm run lint && npm run build

      - name: CDK deploy
        working-directory: cdk
        # PulseCdn excluded — CloudFront blocked on new AWS accounts
        run: npx cdk deploy PulseNetworking PulseStorage PulsePipeline PulseScheduler PulseApi --require-approval never --outputs-file ../cdk-outputs.json

